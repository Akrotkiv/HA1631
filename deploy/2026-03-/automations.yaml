- id: aquarium_manual_override_detection
  alias: Akvárium - Detekcia manuálneho zásahu
  description: Aktivuje manual override pri zmene svetla mimo automatizácie
  trigger:
  - platform: state
    entity_id: light.led_ccww_controller
    attribute: brightness
  - platform: state
    entity_id: light.led_ccww_controller
    attribute: color_temp
  condition:
  - condition: state
    entity_id: input_boolean.aquarium_automation
    state: 'on'
  - condition: state
    entity_id: input_boolean.aquarium_manual_override
    state: 'off'
  - condition: template
    value_template: '{% set last_changed = as_timestamp(states.light.led_ccww_controller.last_changed)
      %} {% set now_ts = as_timestamp(now()) %} {{ (now_ts - last_changed) > 5 }}

      '
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.aquarium_manual_override
  - service: input_number.set_value
    target:
      entity_id: input_number.aquarium_last_brightness
    data:
      value: '{{ state_attr(''light.led_ccww_controller'', ''brightness'') | int(255)
        }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.aquarium_last_color_temp
    data:
      value: '{{ state_attr(''light.led_ccww_controller'', ''color_temp'') | int(250)
        }}'
  - service: persistent_notification.create
    data:
      title: Akvárium
      message: "\U0001F7E1 Detekovaný manuálny zásah - automatizácia pozastavená do
        nasledujúceho časového slotu"
      notification_id: aquarium_manual
  mode: single
- id: aquarium_auto_resume
  alias: Akvárium - Automatické obnovenie automatizácie
  description: Obnoví automatizáciu pri nasledujúcom časovom slote
  trigger:
  - platform: time
    at: input_datetime.aquarium_slot1_time
  - platform: time
    at: input_datetime.aquarium_slot2_time
  - platform: time
    at: input_datetime.aquarium_slot3_time
  - platform: time
    at: input_datetime.aquarium_slot4_time
  - platform: time
    at: input_datetime.aquarium_slot5_time
  condition:
  - condition: state
    entity_id: input_boolean.aquarium_manual_override
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.aquarium_manual_override
  - service: persistent_notification.dismiss
    data:
      notification_id: aquarium_manual
  - service: logbook.log
    data:
      name: Akvárium
      message: "\U0001F535 Automatizácia obnovená - spúšťa sa časový slot"
  mode: single
- id: aquarium_restore_after_restart
  alias: Akvárium - Obnova po reštarte
  description: Obnoví posledný stav svetla po reštarte HA
  trigger:
  - platform: homeassistant
    event: start
  condition:
  - condition: state
    entity_id: light.led_ccww_controller
    state: 'on'
  action:
  - delay:
      seconds: 30
  - service: script.aquarium_restore_state
  mode: single
- alias: Dražice - Nastavenie režimu
  description: Automaticky nastaví režim a teplotu termostatu podľa podmienok
  trigger:
  - platform: time_pattern
    minutes: /5
  - platform: state
    entity_id: sensor.active_power
  - platform: state
    entity_id:
    - binary_sensor.t1_aktivna
    - binary_sensor.t2_aktivna
    - binary_sensor.t3_aktivna
    - binary_sensor.t4_aktivna
  - platform: state
    entity_id: climate.drazitherm
    attribute: current_temperature
  - platform: homeassistant
    event: start
  condition:
  - condition: state
    entity_id: input_boolean.tariff_system_enabled
    state: 'on'
  action:
  - variables:
      recommended_mode: '{{ states(''sensor.drazice_odporucany_rezim'') }}'
      current_mode: '{{ states(''input_select.bojler_drazice_mode'') }}'
      target_temp: '{{ state_attr(''sensor.drazice_odporucany_rezim'', ''target_temperature'')
        | float(45) }}'
      current_temp: '{{ state_attr(''climate.drazitherm'', ''current_temperature'')
        | float(50) }}'
  - condition: template
    value_template: '{{ recommended_mode != current_mode }}'
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_drazice_mode
    data:
      option: '{{ recommended_mode }}'
  - service: climate.set_temperature
    target:
      entity_id: climate.drazitherm
    data:
      temperature: '{{ target_temp }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ current_temp < target_temp }}'
      sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.drazitherm
        data:
          hvac_mode: heat
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_drazice_start_reason
    data:
      option: "{% if is_state('binary_sensor.drazice_forced_needed', 'on') %}\n  forced\n{%
        elif states('sensor.active_power') | float(0) > states('input_number.bojler_drazice_surplus_threshold_boost')
        | float(2500) %}\n  surplus\n{% elif is_state('binary_sensor.t1_aktivna',
        'on') %}\n  t1\n{% elif is_state('binary_sensor.t2_aktivna', 'on') %}\n  t2\n{%
        elif is_state('binary_sensor.t3_aktivna', 'on') %}\n  t3\n{% else %}\n  forced\n{%
        endif %}\n"
  - service: logbook.log
    data:
      name: Dražice Termostat
      message: "\U0001F504 Režim zmenený: {{ current_mode }} → {{ recommended_mode
        }} \U0001F321️ Cieľová teplota: {{ target_temp }}°C \U0001F4CA {{ state_attr('sensor.drazice_odporucany_rezim',
        'reason') }}\n"
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.bojler_drazice_start_time
    data:
      timestamp: '{{ now().timestamp() }}'
  mode: restart
  id: c17f02a921464407946209c63afbc7ef
- alias: Dražice - Vynútený ohrev
  description: Zapne ohrev ak teplota klesne pod minimum
  trigger:
  - platform: numeric_state
    entity_id: climate.drazitherm
    attribute: current_temperature
    below: input_number.bojler_drazice_temp_forced
  condition:
  - condition: state
    entity_id: input_boolean.tariff_system_enabled
    state: 'on'
  action:
  - service: input_boolean.turn_on
    target:
