- id: cost_tracking_klima_update
  alias: Náklady - Klíma aktualizácia
  description: Každých 5 minút počíta náklady klímy podľa aktuálnej tarify
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: state
    entity_id: input_boolean.cost_tracking_enabled
    state: 'on'
  - condition: state
    entity_id: switch.klima_cojirbfaaai_power_switch
    state: 'on'
  action:
  - variables:
      klima_power_kw: "{% set energy_today = states('sensor.klima_cojirbfaaai_today_energy_consumption')
        | float(0) %} {% set work_time_min = states('sensor.klima_cojirbfaaai_today_work_time')
        | float(1) %} {% if work_time_min > 0 %}\n  {{ (energy_today / (work_time_min
        / 60)) }}\n{% else %}\n  1.0\n{% endif %}\n"
      energy_5min: '{{ (klima_power_kw | float(1.0) * 5 / 60) | round(4) }}'
      price_kwh: '{{ state_attr(''sensor.aktualna_tarifa'', ''price_eur_kwh'') | float(0)
        }}'
      cost_5min: '{{ (energy_5min | float(0) * price_kwh | float(0)) | round(5) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_daily_klima
    data:
      value: '{{ (states(''input_number.cost_daily_klima'') | float(0) + cost_5min
        | float(0)) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_monthly_klima
    data:
      value: '{{ (states(''input_number.cost_monthly_klima'') | float(0) + cost_5min
        | float(0)) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.energy_daily_klima
    data:
      value: '{{ (states(''input_number.energy_daily_klima'') | float(0) + energy_5min
        | float(0)) | round(3) }}'
  mode: single
- id: cost_tracking_drazice_update
  alias: Náklady - Dražice aktualizácia
  description: Každých 5 minút počíta náklady Dražice keď hrieva (2000W)
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: state
    entity_id: input_boolean.cost_tracking_enabled
    state: 'on'
  - condition: state
    entity_id: climate.drazitherm
    state: heat
  action:
  - variables:
      drazice_power_kw: 2.0
      energy_5min: '{{ (drazice_power_kw * 5 / 60) | round(4) }}'
      price_kwh: '{{ state_attr(''sensor.aktualna_tarifa'', ''price_eur_kwh'') | float(0)
        }}'
      cost_5min: '{{ (energy_5min * price_kwh) | round(5) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_daily_bojler_drazice
    data:
      value: '{{ (states(''input_number.cost_daily_bojler_drazice'') | float(0) +
        cost_5min) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_monthly_bojler_drazice
    data:
      value: '{{ (states(''input_number.cost_monthly_bojler_drazice'') | float(0)
        + cost_5min) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.energy_daily_bojler_drazice
    data:
      value: '{{ (states(''input_number.energy_daily_bojler_drazice'') | float(0)
        + energy_5min) | round(3) }}'
  mode: single
- id: cost_tracking_ariston_update
  alias: Náklady - Ariston aktualizácia
  description: Každých 5 minút počíta náklady Ariston keď je zapnutý
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: state
    entity_id: input_boolean.cost_tracking_enabled
    state: 'on'
  - condition: state
    entity_id: switch.pw_bojler_immax
    state: 'on'
  action:
  - variables:
      ariston_power_w: '{{ states(''sensor.pw_bojler_immax_power'') | float(0) }}'
      ariston_power_kw: '{{ (ariston_power_w / 1000) }}'
      energy_5min: '{{ (ariston_power_kw | float(0) * 5 / 60) | round(4) }}'
      price_kwh: '{{ state_attr(''sensor.aktualna_tarifa'', ''price_eur_kwh'') | float(0)
        }}'
      cost_5min: '{{ (energy_5min | float(0) * price_kwh) | round(5) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_daily_bojler_ariston
    data:
      value: '{{ (states(''input_number.cost_daily_bojler_ariston'') | float(0) +
        cost_5min | float(0)) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.cost_monthly_bojler_ariston
    data:
      value: '{{ (states(''input_number.cost_monthly_bojler_ariston'') | float(0)
        + cost_5min | float(0)) | round(3) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.energy_daily_bojler_ariston
    data:
      value: '{{ (states(''input_number.energy_daily_bojler_ariston'') | float(0)
        + energy_5min | float(0)) | round(3) }}'
  mode: single
- id: cost_tracking_daily_reset
  alias: Náklady - Denný reset
  description: O polnoci resetuje denné počítadlá nákladov
  trigger:
  - platform: time
    at: 00:00:00
  action:
  - service: input_number.set_value
    target:
      entity_id:
      - input_number.cost_daily_klima
      - input_number.cost_daily_bojler_drazice
      - input_number.cost_daily_bojler_ariston
      - input_number.energy_daily_klima
      - input_number.energy_daily_bojler_drazice
      - input_number.energy_daily_bojler_ariston
    data:
      value: 0
  - service: logbook.log
    data:
      name: Cost Tracking
      message: "\U0001F504 Denné počítadlá nákladov resetované"
  mode: single
- id: cost_tracking_monthly_reset
  alias: Náklady - Mesačný reset
  description: Na začiatku mesiaca resetuje mesačné počítadlá
  trigger:
  - platform: time
    at: 00:00:05
  condition:
  - condition: template
    value_template: '{{ now().day == 1 }}'
  action:
  - service: logbook.log
    data:
      name: Cost Tracking
      message: "\U0001F4CA Mesačný report - Klíma: {{ states('input_number.cost_monthly_klima')
        | round(2) }} EUR, Dražice: {{ states('input_number.cost_monthly_bojler_drazice')
        | round(2) }} EUR, Ariston: {{ states('input_number.cost_monthly_bojler_ariston')
        | round(2) }} EUR\n"
  - service: input_number.set_value
    target:
      entity_id:
      - input_number.cost_monthly_klima
      - input_number.cost_monthly_bojler_drazice
      - input_number.cost_monthly_bojler_ariston
    data:
      value: 0
  mode: single

# ========================================
# VETRANIE - CO2 AUTOMATIZÁCIA (Fix #5)
# ========================================
- id: vetranie_co2_high
  alias: Vetranie - CO2 vysoké - zvýšiť
  description: Pri vysokom CO2 zvýši stupeň vetrania
  trigger:
  - platform: numeric_state
    entity_id: sensor.wifi_smart_switch_carbon_dioxide
    above: input_number.vetranie_co2_threshold_high
    for:
      minutes: 2
  condition:
  - condition: state
    entity_id: input_boolean.vetranie_co2_auto_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.vetranie_forced_off
    state: 'off'
  - condition: template
    value_template: >
      {{ states('input_number.vetranie_stupen') | int < states('input_number.vetranie_co2_stupen') | int }}
  action:
  - service: script.vetranie_nastav_stupen
    data:
      stupen: '{{ states(''input_number.vetranie_co2_stupen'') | int }}'
  - service: logbook.log
    data:
      name: Vetranie CO2
      message: "⬆️ CO2 vysoké ({{ states('sensor.wifi_smart_switch_carbon_dioxide') }} ppm) - stupeň zvýšený na {{ states('input_number.vetranie_co2_stupen') }}"
  mode: single

- id: vetranie_co2_low
  alias: Vetranie - CO2 nízke - znížiť
  description: Pri nízkom CO2 vráti stupeň vetrania na predchádzajúci
  trigger:
  - platform: numeric_state
    entity_id: sensor.wifi_smart_switch_carbon_dioxide
    below: input_number.vetranie_co2_threshold_low
    for:
      minutes: 5
  condition:
  - condition: state
    entity_id: input_boolean.vetranie_co2_auto_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.vetranie_forced_off
    state: 'off'
  - condition: template
    value_template: >
      {{ states('input_number.vetranie_stupen') | int > 1 }}
  action:
  - service: script.vetranie_nastav_stupen
    data:
      stupen: 1
  - service: logbook.log
    data:
      name: Vetranie CO2
      message: "⬇️ CO2 nízke ({{ states('sensor.wifi_smart_switch_carbon_dioxide') }} ppm) - stupeň znížený na 1"
  mode: single

- id: vetranie_forced_off_activated
  alias: Vetranie - Forced OFF aktivované
  description: Pri zapnutí forced_off okamžite vypne vetranie na stupeň 0
  trigger:
  - platform: state
    entity_id: input_boolean.vetranie_forced_off
    to: 'on'
  action:
  - service: script.vetranie_nastav_stupen
    data:
      stupen: 0
  - service: logbook.log
    data:
      name: Vetranie
      message: "🛑 Vynútené vypnutie vetrania - stupeň 0, automatizácia pozastavená"
  - service: persistent_notification.create
    data:
      title: "💨 Vetranie - Vynútené vypnutie"
      message: >
        Vetranie je vynútene vypnuté.
        {% if is_state('input_boolean.vetranie_auto_restart_enabled', 'on') %}
        Automatický reštart o {{ states('input_datetime.vetranie_auto_restart_time') }}
        na stupeň {{ states('input_number.vetranie_auto_restart_stupen') | int }}.
        {% else %}
        Automatický reštart nie je nastavený.
        {% endif %}
      notification_id: vetranie_forced_off
  mode: single

- id: vetranie_forced_off_deactivated
  alias: Vetranie - Forced OFF deaktivované
  description: Pri vypnutí forced_off obnoví normálnu prevádzku
  trigger:
  - platform: state
    entity_id: input_boolean.vetranie_forced_off
    to: 'off'
  action:
  - service: persistent_notification.dismiss
    data:
      notification_id: vetranie_forced_off
  - service: logbook.log
    data:
      name: Vetranie
      message: "✅ Vynútené vypnutie zrušené - automatizácia obnovená"
  mode: single

- id: vetranie_auto_restart
  alias: Vetranie - Automatický reštart po forced off
  description: V nastavenom čase vypne forced_off a nastaví požadovaný stupeň
  trigger:
  - platform: time
    at: input_datetime.vetranie_auto_restart_time
  condition:
  - condition: state
    entity_id: input_boolean.vetranie_forced_off
    state: 'on'
  - condition: state
    entity_id: input_boolean.vetranie_auto_restart_enabled
    state: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.vetranie_forced_off
  - delay:
      seconds: 2
  - service: script.vetranie_nastav_stupen
    data:
      stupen: '{{ states(''input_number.vetranie_auto_restart_stupen'') | int }}'
  - service: logbook.log
    data:
      name: Vetranie
      message: "🔄 Automatický reštart vetrania - stupeň {{ states('input_number.vetranie_auto_restart_stupen') }}"
  - service: persistent_notification.dismiss
    data:
      notification_id: vetranie_forced_off
  mode: single

# ========================================
# KLÍMA - HEALTH SWITCH PRI ZAPNUTÍ (Fix #6)
# ========================================
- id: klima_health_switch_on
  alias: Klíma - Zapnúť Health pri zapnutí klímy
  description: Pri zapnutí klimatizácie automaticky zapne aj Health (Healthy) prepínač
  trigger:
  - platform: state
    entity_id: switch.klima_cojirbfaaai_power_switch
    to: 'on'
  action:
  - delay:
      seconds: 3
  - service: switch.turn_on
    target:
      entity_id: switch.klima_cojirbfaaai_healthy_switch
  - service: logbook.log
    data:
      name: Klíma
      message: "🏥 Health prepínač automaticky zapnutý spolu s klimatizáciou"
  mode: single
