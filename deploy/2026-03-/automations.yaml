- alias: STYRBAR Hosťovská - Ovládanie žalúzií
  description: Ovládanie žalúzií cover.hostovska_l a cover.hostovska_p cez IKEA STYRBAR
  id: styrbar_hostovska_covers
  mode: restart
  trigger:
  - platform: mqtt
    topic: zigbee2mqtt/RC STYRBAR 1/action
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''on'' }}'
      sequence:
      - service: cover.open_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''off'' }}'
      sequence:
      - service: cover.close_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''arrow_left_click'' }}'
      sequence:
      - service: button.press
        target:
          entity_id:
          - button.hostovska_l_my_position
          - button.hostovska_p_my_position
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''arrow_right_click'' }}'
      sequence:
      - service: cover.stop_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''brightness_move_up'' }}'
      sequence:
      - service: cover.open_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''brightness_move_down'' }}'
      sequence:
      - service: cover.close_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
    - conditions:
      - condition: template
        value_template: '{{ trigger.payload == ''brightness_stop'' }}'
      sequence:
      - service: cover.stop_cover
        target:
          entity_id:
          - cover.hostovska_l
          - cover.hostovska_p
