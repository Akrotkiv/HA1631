- alias: Ariston - Flexibilné zapnutie
  description: Zapína Ariston len ak je Dražice zohriaty alebo sú veľké prebytky
  trigger:
  - platform: template
    value_template: '{{ is_state(''input_boolean.bojler_ariston_enable_surplus'',
      ''on'') and states(''sensor.active_power'') | float(0) > states(''input_number.bojler_ariston_surplus_threshold_on'')
      | float(2000) }}'
    id: surplus_enabled
  - platform: state
    entity_id: binary_sensor.t1_aktivna
    to: 'on'
    id: t1_start
  - platform: state
    entity_id: binary_sensor.t2_aktivna
    to: 'on'
    id: t2_start
  - platform: state
    entity_id: binary_sensor.t3_aktivna
    to: 'on'
    id: t3_start
  condition:
  - condition: state
    entity_id: switch.pw_bojler_immax
    state: 'off'
  - condition: state
    entity_id: input_boolean.tariff_system_enabled
    state: 'on'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.drazice_zohriaty
        state: 'on'
      - condition: state
        entity_id: input_boolean.bojler_ariston_enable_surplus
        state: 'on'
      - condition: template
        value_template: '{{ states(''sensor.active_power'') | float(0) > states(''input_number.bojler_ariston_surplus_threshold_on'')
          | float(2000) }}'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_ariston_enable_surplus
        state: 'on'
      - condition: template
        value_template: '{{ states(''sensor.active_power'') | float(0) > states(''input_number.combined_surplus_threshold'')
          | float(3600) }}'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_ariston_enable_t1
        state: 'on'
      - condition: state
        entity_id: binary_sensor.t1_aktivna
        state: 'on'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_ariston_enable_t2
        state: 'on'
      - condition: state
        entity_id: binary_sensor.t2_aktivna
        state: 'on'
      - condition: state
        entity_id: binary_sensor.drazice_zohriaty
        state: 'on'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_ariston_enable_t3
        state: 'on'
      - condition: state
        entity_id: binary_sensor.t3_aktivna
        state: 'on'
      - condition: state
        entity_id: binary_sensor.drazice_zohriaty
        state: 'on'
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.pw_bojler_immax
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.bojler_ariston_start_time
    data:
      timestamp: '{{ now().timestamp() }}'
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_ariston_start_reason
    data:
      option: "{% set surplus = states('sensor.active_power') | float(0) %} {% set
        drazice_ready = is_state('binary_sensor.drazice_zohriaty', 'on') %} {% set
        combined_threshold = states('input_number.combined_surplus_threshold') | float(3600)
        %}\n{% if surplus > combined_threshold %}\n  surplus\n{% elif drazice_ready
        and surplus > states('input_number.bojler_ariston_surplus_threshold_on') |
        float(2000) %}\n  drazice_ready\n{% elif is_state('binary_sensor.t1_aktivna',
        'on') %}\n  t1\n{% elif is_state('binary_sensor.t2_aktivna', 'on') %}\n  t2\n{%
        elif is_state('binary_sensor.t3_aktivna', 'on') %}\n  t3\n{% else %}\n  none\n{%
        endif %}\n"
  - service: logbook.log
    data:
      name: Ariston Bojler
      message: "\U0001F7E2 Ariston zapnutý:  {% set surplus = states('sensor.active_power')
        | float(0) %} {% set drazice_ready = is_state('binary_sensor.drazice_zohriaty',
        'on') %} {% set reason = states('input_select.bojler_ariston_start_reason')
        %}\n{% if reason == 'surplus' %}\n  Veľké prebytky ({{ surplus }}W) - oba
        bojlery súčasne\n{% elif reason == 'drazice_ready' %}\n  Dražice zohriaty
        + prebytky ({{ surplus }}W)\n{% elif reason == 't1' %}\n  T1 tarifa aktívna\n{%
        elif reason == 't2' %}\n  T2 tarifa + Dražice zohriaty\n{% elif reason ==
        't3' %}\n  T3 tarifa + Dražice zohriaty\n{% else %}\n  Neznámy dôvod\n{% endif
        %}\n"
  id: ariston_flexible_on
  mode: single
- alias: Ariston - Flexibilné vypnutie
