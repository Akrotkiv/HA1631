- alias: Tarifa - Aktualizácia aktuálnej tarify
  description: Automaticky aktualizuje select s aktuálnou tarifou
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.t1_aktivna
    - binary_sensor.t2_aktivna
    - binary_sensor.t3_aktivna
    - binary_sensor.t4_aktivna
  - platform: homeassistant
    event: start
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.current_tariff
    data:
      option: "{% if is_state('binary_sensor.t1_aktivna', 'on') %}\n  T1\n{% elif
        is_state('binary_sensor.t2_aktivna', 'on') %}\n  T2\n{% elif is_state('binary_sensor.t3_aktivna',
        'on') %}\n  T3\n{% elif is_state('binary_sensor.t4_aktivna', 'on') %}\n  T4\n{%
        else %}\n  T1\n{% endif %}\n"
  mode: single
  id: 4986e5e97eaa46d78558b634d8e4f1ce
- alias: Tarifa - Notifikácia o zmene
  description: Pošle notifikáciu pri zmene tarify
  trigger:
  - platform: state
    entity_id: binary_sensor.nt_aktivna
    to: 'on'
    id: nt_start
  - platform: state
    entity_id: binary_sensor.nt_aktivna
    to: 'off'
    id: nt_end
  condition:
  - condition: state
    entity_id: input_boolean.tariff_system_enabled
    state: 'on'
  action:
  - service: persistent_notification.create
    data:
      title: Zmena elektrickej tarify
      message: "{% if trigger.id == 'nt_start' %}\n  \U0001F7E2 Začala sa NT - vhodný
        čas na zapnutie energeticky náročných zariadení\n{% else %}\n  \U0001F534
        Začala sa VT - odporúča sa obmedzenie spotreby\n{% endif %}\n"
      notification_id: tariff_change
  id: c6de83c5bbe64b99be706e78fa050e68
- alias: Bojler - Flexibilné zapnutie
  description: 'Zapína bojler podľa nastavených prepínačov: prebytky a/alebo NT'
  trigger:
  - platform: template
    value_template: "{{ is_state('input_boolean.bojler_enable_surplus', 'on') and\n
      \  states('sensor.active_power') | float(0) > states('input_number.bojler_surplus_threshold_on')
      | float(3500) }}\n"
    id: surplus_enabled
  - platform: state
    entity_id: binary_sensor.nt_aktivna
    to: 'on'
    id: nt_start
  condition:
  - condition: state
    entity_id: switch.pw_bojler_immax
    state: 'off'
  - condition: state
    entity_id: input_boolean.tariff_system_enabled
    state: 'on'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_enable_surplus
        state: 'on'
      - condition: template
        value_template: '{{ states(''sensor.active_power'') | float(0) > states(''input_number.bojler_surplus_threshold_on'')
          | float(3500) }}

          '
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.bojler_enable_nt
        state: 'on'
      - condition: state
        entity_id: binary_sensor.nt_aktivna
        state: 'on'
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.pw_bojler_immax
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.bojler_start_time
    data:
      timestamp: '{{ now().timestamp() }}'
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_start_reason
    data:
      option: "{% set surplus_active = is_state('input_boolean.bojler_enable_surplus',
        'on') and \n                        states('sensor.active_power') | float(0)
        > states('input_number.bojler_surplus_threshold_on') | float(3500) %}\n{%
        set nt_active = is_state('input_boolean.bojler_enable_nt', 'on') and \n                   is_state('binary_sensor.nt_aktivna',
        'on') %}\n\n{% if surplus_active and nt_active %}\n  both\n{% elif surplus_active
        %}\n  surplus\n{% else %}\n  tariff\n{% endif %}\n"
  - service: logbook.log
    data:
      name: Bojler Flexibilná Automatizácia
      message: "\U0001F7E2 Bojler zapnutý:  {% set surplus_on = is_state('input_boolean.bojler_enable_surplus',
        'on') %} {% set nt_on = is_state('input_boolean.bojler_enable_nt', 'on') %}
        {% set power = states('sensor.active_power') | float(0) %} {% set threshold
        = states('input_number.bojler_surplus_threshold_on') | float(3500) %}\n{%
        if surplus_on and power > threshold and nt_on and is_state('binary_sensor.nt_aktivna',
        'on') %}\n  Prebytky ({{ power }}W) + NT aktívna\n{% elif surplus_on and power
        > threshold %}\n  Prebytky ({{ power }}W)\n{% elif nt_on and is_state('binary_sensor.nt_aktivna',
        'on') %}\n  NT aktívna\n{% else %}\n  Neznámy dôvod\n{% endif %}\n"
  id: 2c4263ba38df47c18b655f9a945f6776
- alias: Bojler - Flexibilné vypnutie
  description: Vypína bojler podľa dôvodu zapnutia a nastavených prahov
  trigger:
  - platform: state
    entity_id: binary_sensor.nt_aktivna
    to: 'off'
    id: nt_end
  - platform: template
    value_template: '{{ states(''sensor.active_power'') | float(0) < states(''input_number.bojler_surplus_threshold_off'')
      | float(-200) }}

      '
    for:
      minutes: 2
    id: surplus_low
  - platform: time_pattern
    minutes: /5
    id: periodic_check
  condition:
  - condition: state
    entity_id: switch.pw_bojler_immax
    state: 'on'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: state
        entity_id: input_select.bojler_start_reason
        state: surplus
      - condition: template
        value_template: '{{ states(''sensor.active_power'') | float(0) < states(''input_number.bojler_surplus_threshold_off'')
          | float(-200) }}

          '
      - condition: template
        value_template: '{% set start_time = states(''input_datetime.bojler_start_time'')
          | as_timestamp %} {% set current_time = now().timestamp() %} {% set running_minutes
          = (current_time - start_time) / 60 %} {% set is_nt = is_state(''binary_sensor.nt_aktivna'',
          ''on'') %} {% set min_time_nt = states(''input_number.bojler_min_time_nt'')
          | float(30) %} {% set min_time_vt = states(''input_number.bojler_min_time_vt'')
          | float(15) %} {% set min_time = min_time_nt if is_nt else min_time_vt %}
          {{ running_minutes >= min_time }}

          '
    - condition: and
      conditions:
      - condition: state
        entity_id: input_select.bojler_start_reason
        state: tariff
      - condition: template
        value_template: '{{ trigger.id == ''nt_end'' }}'
      - condition: template
        value_template: '{% set start_time = states(''input_datetime.bojler_start_time'')
          | as_timestamp %} {% set current_time = now().timestamp() %} {% set running_minutes
          = (current_time - start_time) / 60 %} {% set min_time = states(''input_number.bojler_min_time_nt'')
          | float(30) %} {{ running_minutes >= min_time }}

          '
    - condition: and
      conditions:
      - condition: state
        entity_id: input_select.bojler_start_reason
        state: both
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ trigger.id == ''nt_end'' }}'
          - condition: template
            value_template: '{{ states(''sensor.active_power'') | float(0) < states(''input_number.bojler_surplus_threshold_on'')
              | float(3500) }}

              '
          - condition: template
            value_template: '{% set start_time = states(''input_datetime.bojler_start_time'')
              | as_timestamp %} {% set current_time = now().timestamp() %} {% set
              running_minutes = (current_time - start_time) / 60 %} {% set min_time
              = states(''input_number.bojler_min_time_nt'') | float(30) %} {{ running_minutes
              >= min_time }}

              '
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ trigger.id == ''surplus_low'' }}'
          - condition: state
            entity_id: binary_sensor.nt_aktivna
            state: 'off'
          - condition: template
            value_template: '{% set start_time = states(''input_datetime.bojler_start_time'')
              | as_timestamp %} {% set current_time = now().timestamp() %} {% set
              running_minutes = (current_time - start_time) / 60 %} {% set min_time
              = states(''input_number.bojler_min_time_vt'') | float(15) %} {{ running_minutes
              >= min_time }}

              '
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.pw_bojler_immax
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_start_reason
    data:
      option: none
  - service: logbook.log
    data:
      name: Bojler Flexibilná Automatizácia
      message: "\U0001F534 Bojler vypnutý:  {% set start_time = states('input_datetime.bojler_start_time')
        | as_timestamp %} {% set current_time = now().timestamp() %} {% set running_minutes
        = ((current_time - start_time) / 60) | round(1) %} {% set reason = states('input_select.bojler_start_reason')
        %} {% set power = states('sensor.active_power') | float(0) %}\n{% if reason
        == 'surplus' %}\n  Prebytky poklesli ({{ power }}W) - bežal {{ running_minutes
        }} min\n{% elif reason == 'tariff' %}\n  Koniec NT - bežal {{ running_minutes
        }} min\n{% elif reason == 'both' %}\n  Kombinované podmienky ({{ power }}W)
        - bežal {{ running_minutes }} min\n{% else %}\n  Kontrola stavu - bežal {{
        running_minutes }} min\n{% endif %}\n"
  id: c9b14cbf68e24c69bc33dd468b77f660
- alias: Bojler - Prepnutie dôvodu za behu
  description: Aktualizuje dôvod behu podľa aktuálnych podmienok
  trigger:
  - platform: template
    value_template: '{{ states(''sensor.active_power'') | float(0) > states(''input_number.bojler_surplus_threshold_on'')
      | float(3500) }}

      '
    for:
      minutes: 3
    id: surplus_appeared
  - platform: state
    entity_id: binary_sensor.nt_aktivna
    to: 'on'
    id: nt_appeared
  condition:
  - condition: state
    entity_id: switch.pw_bojler_immax
    state: 'on'
  - condition: template
    value_template: "{% set current_reason = states('input_select.bojler_start_reason')
      %} {% set surplus_active = is_state('input_boolean.bojler_enable_surplus', 'on')
      and \n                        states('sensor.active_power') | float(0) > states('input_number.bojler_surplus_threshold_on')
      | float(3500) %}\n{% set nt_active = is_state('input_boolean.bojler_enable_nt',
      'on') and \n                   is_state('binary_sensor.nt_aktivna', 'on') %}\n\n{%
      if surplus_active and nt_active %}\n  {{ current_reason != 'both' }}\n{% elif
      surplus_active %}\n  {{ current_reason != 'surplus' }}\n{% elif nt_active %}\n
      \ {{ current_reason != 'tariff' }}\n{% else %}\n  false\n{% endif %}\n"
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_start_reason
    data:
      option: "{% set surplus_active = is_state('input_boolean.bojler_enable_surplus',
        'on') and \n                        states('sensor.active_power') | float(0)
        > states('input_number.bojler_surplus_threshold_on') | float(3500) %}\n{%
        set nt_active = is_state('input_boolean.bojler_enable_nt', 'on') and \n                   is_state('binary_sensor.nt_aktivna',
        'on') %}\n\n{% if surplus_active and nt_active %}\n  both\n{% elif surplus_active
        %}\n  surplus\n{% else %}\n  tariff\n{% endif %}\n"
  - service: logbook.log
    data:
      name: Bojler Flexibilná Automatizácia
      message: "\U0001F504 Dôvod behu aktualizovaný: {{ states('input_select.bojler_start_reason')
        }} ({{ states('sensor.active_power') }}W, NT: {{ 'áno' if is_state('binary_sensor.nt_aktivna',
        'on') else 'nie' }})\n"
  id: bcb5878d9e2344658ac04a574223f487
- alias: Bojler - Reset pri manuálnom vypnutí
  description: Resetuje helpers pri manuálnom vypnutí bojlera
  trigger:
  - platform: state
    entity_id: switch.pw_bojler_immax
    to: 'off'
  condition:
  - condition: template
    value_template: '{{ not is_state(''input_select.bojler_start_reason'', ''none'')
      }}

      '
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.bojler_start_reason
    data:
      option: none
  - service: logbook.log
    data:
      name: Bojler Flexibilná Automatizácia
      message: "\U0001F527 Bojler vypnutý manuálne - reset automatiky"
  id: 2127731ccd7743778b721b9788e4f669
