  - service: logbook.log
    data:
      name: Ariston Bojler
      message: "\U0001F534 Ariston vypnutý: {% set start_time = states('input_datetime.bojler_ariston_start_time')
        | as_timestamp %} {% set current_time = now().timestamp() %} {% set running_minutes
        = ((current_time - start_time) / 60) | round(1) %} {% set power = states('sensor.active_power')
        | float(0) %} Bežal {{ running_minutes }} min, aktuálny výkon: {{ power }}W\n"
