          | float(500) }}'
    - condition: and
      conditions:
      - condition: template
        value_template: '{{ trigger.id == ''tariff_end'' }}'
      - condition: template
        value_template: '{{ states(''sensor.active_power'') | float(0) < states(''input_number.bojler_ariston_surplus_threshold_on'')
          | float(2000) }}'
  action:
  - service: switch.turn_off
    target:
