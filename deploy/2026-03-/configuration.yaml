    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2
    mode: slider

  vetranie_co2_stupen:
    name: "Vetranie - Stupeň pri vysokom CO2"
    min: 1
    max: 8
    step: 1
    mode: slider
    icon: mdi:fan-plus

  vetranie_auto_restart_stupen:
    name: "Vetranie - Stupeň pre auto-reštart"
    min: 0
    max: 8
    step: 1
    mode: slider
    icon: mdi:fan-auto
    
command_line:
  - sensor:
      name: "Git Push Status"
      unique_id: git_push_status
      command: "tail -1 /config/www/git_push.log 2>/dev/null || echo 'STATUS:unknown'"
      scan_interval: 10
      value_template: >
        {% set line = value %}
        {% if 'STATUS:ok' in line %}
          ✅ Úspešne pushnuté
        {% elif 'STATUS:no_changes' in line %}
          ℹ️ Žiadne zmeny
        {% elif 'STATUS:error' in line %}
          ❌ Chyba pri push
        {% else %}
          {{ line }}
        {% endif %}
      icon: mdi:github

shell_command:
  git_push_config: '/config/scripts/git_push.sh "{{ message }}"'
  git_export_dashboard: '/config/scripts/export_dashboard.sh'
  git_pull_config: '/config/scripts/git_pull.sh'
  

# ================================
# TEMPLATE SENSORY PRE TARÍFNY SYSTÉM
# ================================

template:
  - binary_sensor:
      # ========================================
      # DETEKCIA VÍKENDU
      # ========================================
      - name: "Je víkend"
        unique_id: je_vikend
        state: >
          {{ now().weekday() >= 5 }}
        icon: >
          {% if now().weekday() >= 5 %}
            mdi:calendar-weekend
          {% else %}
            mdi:calendar-week
          {% endif %}

      # T1 - NOC 22:00-06:00 (cez polnoc)
      - name: "T1 aktívna"
        unique_id: t1_aktivna
        state: >
          {% if not is_state('input_boolean.tariff_system_enabled', 'on') %}
            false
          {% else %}
            {% set now_time = now().strftime('%H:%M') %}
            {% set t1_start = states('input_datetime.tariff_t1_start')[:5] %}
            {% set t1_end = states('input_datetime.tariff_t1_end')[:5] %}
            {{ now_time >= t1_start or now_time < t1_end }}
          {% endif %}
        device_class: power
        icon: mdi:weather-night
        attributes:
          friendly_name: "T1 Noc"
          time_range: "22:00 - 06:00"
          price_week: "{{ states('input_number.tariff_t1_price') }} EUR/kWh"
          price_weekend: "{{ states('input_number.tariff_t1_price_weekend') }} EUR/kWh"
      
      # T2 - POPOLUDNIE 13:00-19:00
      - name: "T2 aktívna"
        unique_id: t2_aktivna
        state: >
          {% if not is_state('input_boolean.tariff_system_enabled', 'on') %}
            false
          {% else %}
            {% set now_time = now().strftime('%H:%M') %}
            {% set t2_start = states('input_datetime.tariff_t2_start')[:5] %}
            {% set t2_end = states('input_datetime.tariff_t2_end')[:5] %}
            {{ t2_start <= now_time < t2_end }}
          {% endif %}
        device_class: power
        icon: mdi:weather-sunset-down
        attributes:
          friendly_name: "T2 Popoludnie"
          time_range: "13:00 - 19:00"
          price_week: "{{ states('input_number.tariff_t2_price') }} EUR/kWh"
          price_weekend: "{{ states('input_number.tariff_t2_price_weekend') }} EUR/kWh"
      
      # T3 - PREDPOLUDNIE 09:00-13:00
      - name: "T3 aktívna"
        unique_id: t3_aktivna
        state: >
          {% if not is_state('input_boolean.tariff_system_enabled', 'on') %}
            false
          {% else %}
            {% set now_time = now().strftime('%H:%M') %}
            {% set t3_start = states('input_datetime.tariff_t3_start')[:5] %}
            {% set t3_end = states('input_datetime.tariff_t3_end')[:5] %}
            {{ t3_start <= now_time < t3_end }}
          {% endif %}
        device_class: power
        icon: mdi:weather-sunny
        attributes:
          friendly_name: "T3 Predpoludnie"
          time_range: "09:00 - 13:00"
          price_week: "{{ states('input_number.tariff_t3_price') }} EUR/kWh"
          price_weekend: "{{ states('input_number.tariff_t3_price_weekend') }} EUR/kWh"
      
      # T4 - RÁNO/VEČER 06:00-09:00 + 19:00-22:00
      - name: "T4 aktívna"
        unique_id: t4_aktivna
        state: >
          {% if not is_state('input_boolean.tariff_system_enabled', 'on') %}
            false
          {% else %}
            {% set now_time = now().strftime('%H:%M') %}
            {% set t4_morning_start = states('input_datetime.tariff_t4_morning_start')[:5] %}
            {% set t4_morning_end = states('input_datetime.tariff_t4_morning_end')[:5] %}
            {% set t4_evening_start = states('input_datetime.tariff_t4_evening_start')[:5] %}
            {% set t4_evening_end = states('input_datetime.tariff_t4_evening_end')[:5] %}
            {% set morning = t4_morning_start <= now_time < t4_morning_end %}
            {% set evening = t4_evening_start <= now_time < t4_evening_end %}
            {{ morning or evening }}
          {% endif %}
        device_class: power
        icon: mdi:alert-circle
        attributes:
          friendly_name: "T4 Ráno/Večer"
          time_range: "06:00-09:00 + 19:00-22:00"
          price_week: "{{ states('input_number.tariff_t4_price') }} EUR/kWh"
          price_weekend: "{{ states('input_number.tariff_t4_price_weekend') }} EUR/kWh"
  
  - sensor:
      # ========================================
      # AKTUÁLNA TARIFA - HLAVNÝ SENSOR
      # ========================================
      - name: "Aktuálna tarifa"
        unique_id: aktualna_tarifa_4T
        state: >
          {% if is_state('binary_sensor.t1_aktivna', 'on') %}
            T1
          {% elif is_state('binary_sensor.t2_aktivna', 'on') %}
            T2
          {% elif is_state('binary_sensor.t3_aktivna', 'on') %}
            T3
          {% elif is_state('binary_sensor.t4_aktivna', 'on') %}
            T4
          {% else %}
            Unknown
          {% endif %}
        icon: >
          {% if is_state('binary_sensor.t1_aktivna', 'on') %}
            mdi:weather-night
          {% elif is_state('binary_sensor.t2_aktivna', 'on') %}
            mdi:weather-sunset-down
          {% elif is_state('binary_sensor.t3_aktivna', 'on') %}
            mdi:weather-sunny
          {% elif is_state('binary_sensor.t4_aktivna', 'on') %}
            mdi:alert-circle
          {% else %}
            mdi:help-circle
          {% endif %}
        attributes:
          je_vikend: "{{ is_state('binary_sensor.je_vikend', 'on') }}"
          price_eur_kwh: >
            {% set weekend = is_state('binary_sensor.je_vikend', 'on') %}
            {% if is_state('binary_sensor.t1_aktivna', 'on') %}
              {% if weekend %}
                {{ states('input_number.tariff_t1_price_weekend') | float(0.11252) }}
              {% else %}
                {{ states('input_number.tariff_t1_price') | float(0.12015) }}
              {% endif %}
            {% elif is_state('binary_sensor.t2_aktivna', 'on') %}
              {% if weekend %}
                {{ states('input_number.tariff_t2_price_weekend') | float(0.15641) }}
              {% else %}
                {{ states('input_number.tariff_t2_price') | float(0.17002) }}
              {% endif %}
            {% elif is_state('binary_sensor.t3_aktivna', 'on') %}
              {% if weekend %}
                {{ states('input_number.tariff_t3_price_weekend') | float(0.12249) }}
              {% else %}
                {{ states('input_number.tariff_t3_price') | float(0.13148) }}
              {% endif %}
            {% elif is_state('binary_sensor.t4_aktivna', 'on') %}
              {% if weekend %}
                {{ states('input_number.tariff_t4_price_weekend') | float(0.20492) }}
              {% else %}
                {{ states('input_number.tariff_t4_price') | float(0.22514) }}
              {% endif %}
            {% else %}
              0
            {% endif %}
          time_range: >
            {% if is_state('binary_sensor.t1_aktivna', 'on') %}
              22:00 - 06:00
            {% elif is_state('binary_sensor.t2_aktivna', 'on') %}
              13:00 - 19:00
            {% elif is_state('binary_sensor.t3_aktivna', 'on') %}
              09:00 - 13:00
            {% elif is_state('binary_sensor.t4_aktivna', 'on') %}
              06:00-09:00, 19:00-22:00
            {% else %}
              Unknown
            {% endif %}

      # ========================================
      # AKTUÁLNA CENA - EUR/kWh (s distribúciou a DPH)
      # Automaticky zohľadňuje víkend
      # ========================================
      - name: "Aktuálna cena kWh"
        unique_id: aktualna_cena_kwh
        state: >
          {{ state_attr('sensor.aktualna_tarifa', 'price_eur_kwh') | float(0) | round(5) }}
        unit_of_measurement: "EUR/kWh"
        icon: mdi:currency-eur
        attributes:
          typ_dna: >
            {% if is_state('binary_sensor.je_vikend', 'on') %}
              víkend
            {% else %}
              pracovný deň
            {% endif %}
          tarifa: "{{ states('sensor.aktualna_tarifa') }}"

      # ========================================
      # NÁKLADY SPOTREBIČOV - TEMPLATE SENSORS
      # ========================================
      
      # Klíma - aktuálny príkon v kW (pre výpočet nákladov)
      - name: "Klíma príkon kW"
        unique_id: klima_prikon_kw
        state: >
          {% set energy_today = states('sensor.klima_cojirbfaaai_today_energy_consumption') | float(0) %}
          {% set work_time_min = states('sensor.klima_cojirbfaaai_today_work_time') | float(0) %}
          {% if work_time_min > 0 %}
            {{ (energy_today / (work_time_min / 60)) | round(3) }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "kW"
        device_class: power
        icon: mdi:air-conditioner

      # Denné náklady - Klíma (priebežný výpočet)
      - name: "Klíma denné náklady"
        unique_id: klima_denne_naklady
        state: "{{ states('input_number.cost_daily_klima') | float(0) | round(3) }}"
        unit_of_measurement: "EUR"
        icon: mdi:air-conditioner

      # Denné náklady - Bojler Dražice
      - name: "Dražice denné náklady"
        unique_id: drazice_denne_naklady
        state: "{{ states('input_number.cost_daily_bojler_drazice') | float(0) | round(3) }}"
        unit_of_measurement: "EUR"
        icon: mdi:water-boiler

      # Denné náklady - Bojler Ariston
      - name: "Ariston denné náklady"
        unique_id: ariston_denne_naklady
        state: "{{ states('input_number.cost_daily_bojler_ariston') | float(0) | round(3) }}"
        unit_of_measurement: "EUR"
        icon: mdi:water-boiler-alert

      # Mesačné náklady - Klíma
      - name: "Klíma mesačné náklady"
        unique_id: klima_mesacne_naklady
        state: "{{ states('input_number.cost_monthly_klima') | float(0) | round(2) }}"
        unit_of_measurement: "EUR"
        icon: mdi:air-conditioner

      # Mesačné náklady - Bojler Dražice
      - name: "Dražice mesačné náklady"
        unique_id: drazice_mesacne_naklady
        state: "{{ states('input_number.cost_monthly_bojler_drazice') | float(0) | round(2) }}"
        unit_of_measurement: "EUR"
        icon: mdi:water-boiler

      # Mesačné náklady - Bojler Ariston
      - name: "Ariston mesačné náklady"
        unique_id: ariston_mesacne_naklady
        state: "{{ states('input_number.cost_monthly_bojler_ariston') | float(0) | round(2) }}"
        unit_of_measurement: "EUR"
        icon: mdi:water-boiler-alert

      # Celkové denné náklady spotrebičov
      - name: "Celkové denné náklady spotrebičov"
        unique_id: celkove_denne_naklady
        state: >
          {% set klima = states('input_number.cost_daily_klima') | float(0) %}
          {% set drazice = states('input_number.cost_daily_bojler_drazice') | float(0) %}
          {% set ariston = states('input_number.cost_daily_bojler_ariston') | float(0) %}
          {{ (klima + drazice + ariston) | round(3) }}
        unit_of_measurement: "EUR"
        icon: mdi:sigma

  - binary_sensor:
      # Dražice dosiahol cieľovú teplotu
      - name: "Dražice zohriaty"
        unique_id: drazice_zohriaty
        state: >
          {% set current = state_attr('climate.drazitherm', 'current_temperature') | float(0) %}
          {% set target = state_attr('climate.drazitherm', 'temperature') | float(45) %}
          {{ current >= target }}
        icon: >
          {% if is_state('binary_sensor.drazice_zohriaty', 'on') %}
            mdi:check-circle
          {% else %}
            mdi:heating
          {% endif %}
        attributes:
          current_temp: "{{ state_attr('climate.drazitherm', 'current_temperature') }}"
          target_temp: "{{ state_attr('climate.drazitherm', 'temperature') }}"
      
      # Dražice potrebuje núdzové ohrev (pod 38°C)
      - name: "Dražice vynútený režim potrebný"
        unique_id: drazice_forced_needed
        state: >
          {% set current = state_attr('climate.drazitherm', 'current_temperature') | float(50) %}
          {% set forced_temp = states('input_number.bojler_drazice_temp_forced') | float(38) %}
          {{ current < forced_temp }}
        icon: mdi:alert-circle
  
  - sensor:
      # Odporúčaný režim pre Dražice
      - name: "Dražice odporúčaný režim"
        unique_id: drazice_recommended_mode
        state: >
          {% set surplus = states('sensor.active_power') | float(0) %}
          {% set threshold_boost = states('input_number.bojler_drazice_surplus_threshold_boost') | float(2500) %}
          {% set current_temp = state_attr('climate.drazitherm', 'current_temperature') | float(50) %}
          {% set forced_temp = states('input_number.bojler_drazice_temp_forced') | float(38) %}
          
          {# PRIORITA 1: Vynútený režim ak je príliš studená voda #}
          {% if current_temp < forced_temp %}
            FORCED
          
          {# PRIORITA 2: BOOST pri prebytkoch #}
          {% elif surplus > threshold_boost and is_state('input_boolean.bojler_drazice_enable_surplus', 'on') %}
            BOOST
          
          {# PRIORITA 3: NORMAL pri T1 #}
          {% elif is_state('binary_sensor.t1_aktivna', 'on') and is_state('input_boolean.bojler_drazice_enable_t1', 'on') %}
            NORMAL
          
          {# PRIORITA 4: NORMAL pri T2 ak je povolené #}
          {% elif is_state('binary_sensor.t2_aktivna', 'on') and is_state('input_boolean.bojler_drazice_enable_t2', 'on') %}
            NORMAL
          
          {# PRIORITA 5: NORMAL pri T3 ak je povolené #}
          {% elif is_state('binary_sensor.t3_aktivna', 'on') and is_state('input_boolean.bojler_drazice_enable_t3', 'on') %}
            NORMAL
          
          {# Inak udržuj FORCED minimum #}
          {% else %}
            FORCED
          {% endif %}
        icon: >
          {% if is_state('sensor.drazice_odporucany_rezim', 'BOOST') %}
            mdi:thermometer-high
          {% elif is_state('sensor.drazice_odporucany_rezim', 'NORMAL') %}
            mdi:thermometer
          {% elif is_state('sensor.drazice_odporucany_rezim', 'FORCED') %}
            mdi:thermometer-low
          {% else %}
            mdi:thermometer-off
          {% endif %}
        attributes:
          target_temperature: >
            {% if is_state('sensor.drazice_odporucany_rezim', 'BOOST') %}
              {{ states('input_number.bojler_drazice_temp_boost') }}
            {% elif is_state('sensor.drazice_odporucany_rezim', 'NORMAL') %}
              {{ states('input_number.bojler_drazice_temp_normal') }}
            {% elif is_state('sensor.drazice_odporucany_rezim', 'FORCED') %}
              {{ states('input_number.bojler_drazice_temp_forced') }}
            {% else %}
              0
            {% endif %}
          reason: >
            {% set surplus = states('sensor.active_power') | float(0) %}
            {% set current_temp = state_attr('climate.drazitherm', 'current_temperature') | float(50) %}
            {% set forced_temp = states('input_number.bojler_drazice_temp_forced') | float(38) %}
            
            {% if current_temp < forced_temp %}
              Teplota pod {{ forced_temp }}°C - núdzový ohrev
            {% elif surplus > states('input_number.bojler_drazice_surplus_threshold_boost') | float(2500) %}
              Prebytky {{ surplus }}W - BOOST režim
            {% elif is_state('binary_sensor.t1_aktivna', 'on') %}
              T1 tarifa aktívna - normálny ohrev
            {% elif is_state('binary_sensor.t2_aktivna', 'on') %}
              T2 tarifa aktívna - normálny ohrev
            {% else %}
              Udržiavací režim
            {% endif %}
